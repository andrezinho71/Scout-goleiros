<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Time Scout Goleiros</title>
<style>
  *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#eef2f7;color:#111827} .wrap{max-width:1100px;margin:0 auto;padding:14px} .card{background:#fff;border-radius:14px;padding:14px;margin:12px 0;box-shadow:0 3px 12px rgba(0,0,0,.08)} h1{margin:6px 0 4px;font-size:26px}.sub{color:#64748b;margin-bottom:10px} input,button,select{font-size:16px;border-radius:9px;border:1px solid #cbd5e1;padding:10px} input{width:100%;margin:5px 0}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn{border:0;color:white;font-weight:700;cursor:pointer}.blue{background:#2563eb}.green{background:#15803d}.red{background:#dc2626}.gray{background:#475569}.orange{background:#f59e0b;color:#111827}.purple{background:#7c3aed}.actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:8px}.action{background:#e2e8f0;color:#111827;border:2px solid transparent;font-weight:700;min-height:50px}.action.active{background:#1d4ed8;color:#fff;border-color:#0f172a;transform:scale(1.02)}.keepers{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}.keeper{background:#0f172a;color:#fff;border:0;border-radius:14px;padding:18px 10px;font-size:18px;font-weight:800;min-height:66px}.keeper.flash{background:#16a34a}.last{font-size:15px;color:#334155}.log{max-height:160px;overflow:auto;border:1px solid #e2e8f0;border-radius:10px;padding:8px;background:#f8fafc}.table-wrap{overflow:auto}table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #cbd5e1;padding:7px;text-align:center}th{background:#0f172a;color:white;position:sticky;top:0}td:first-child,th:first-child{text-align:left;font-weight:700}.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#dbeafe;color:#1e40af;font-weight:800}.small{font-size:12px;color:#64748b}.hidden{display:none}@media(max-width:700px){.wrap{padding:8px}.card{padding:10px;margin:8px 0}.actions{grid-template-columns:repeat(2,1fr)}.keepers{grid-template-columns:repeat(2,1fr)}h1{font-size:22px}button{font-size:14px;padding:9px}.keeper{font-size:16px;min-height:58px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>🧤 Time Scout Goleiros</h1>
    <div class="sub">Modo rápido: selecione uma ação e toque no goleiro.</div>
    <input id="team" placeholder="Nome do time" />
    <input id="opp" placeholder="Adversário" />
    <div class="row">
      <input id="date" type="date" style="flex:1;min-width:170px" />
      <input id="comp" placeholder="Competição / Rodada" style="flex:2;min-width:200px" />
    </div>
    <div class="row" style="margin-top:8px">
      <button class="btn orange" id="p1" onclick="setPeriod(1)">1º tempo</button>
      <button class="btn blue" id="p2" onclick="setPeriod(2)">2º tempo</button>
      <span class="pill" id="periodLabel">1º tempo</span>
    </div>
  </div>

  <div class="card" id="manageCard">
    <h2>Goleiros</h2>
    <div class="row">
      <input id="keeperName" placeholder="Nome do goleiro" style="flex:1;min-width:220px" />
      <button class="btn blue" onclick="addKeeper()">Adicionar</button>
      <button class="btn gray" onclick="loadExample()">Exemplo</button>
      <button class="btn red" onclick="clearKeepers()">Limpar goleiros</button>
    </div>
  </div>

  <div class="card">
    <h2>Ações rápidas</h2>
    <div class="small">A ação selecionada fica azul. Depois toque no goleiro.</div><br/>
    <div class="actions" id="actions"></div>
  </div>

  <div class="card">
    <h2>Toque no goleiro</h2>
    <div class="keepers" id="keepers"></div>
    <p class="last"><b>Última ação:</b> <span id="lastAction">Nenhuma</span></p>
    <div class="row">
      <button class="btn red" onclick="undo()">↩ Desfazer última</button>
      <button class="btn green" onclick="renderReport()">Atualizar relatório</button>
      <button class="btn blue" onclick="exportCSV()">Exportar CSV/Excel</button>
      <button class="btn gray" onclick="resetStats()">Zerar estatísticas</button>
    </div>
  </div>

  <div class="card">
    <h2>Últimos registros</h2>
    <div class="log" id="log">Sem registros.</div>
  </div>

  <div class="card">
    <h2>Relatório</h2>
    <div class="table-wrap" id="report"></div>
  </div>
</div>

<script>
const ACTIONS = [
  ['defesa_encaixe','🧤 Defesa encaixe/pacote'],
  ['defesa_meia','🧤 Defesa meia altura'],
  ['defesa_rasteira','🧤 Defesa rasteira'],
  ['defesa_corporal','🧤 Defesa corporal'],
  ['gol_alto','🥅 Gol sofrido alto'],
  ['gol_meia','🥅 Gol sofrido meia altura'],
  ['gol_rasteiro','🥅 Gol sofrido rasteiro'],
  ['cara_cara','⚔️ Cara a cara'],
  ['defesa_1x1','🛡️ Defesa 1x1'],
  ['saida_gol','🚀 Saída do gol'],
  ['passe_certo','✅ Passe certo'],
  ['passe_errado','❌ Passe errado'],
  ['lanc_certo','🎯 Lançamento certo'],
  ['lanc_errado','↗️ Lançamento errado'],
  ['assistencia','⭐ Assistência'],
  ['erro_fin_gol','⚠️ Erro gerou finalização/gol']
];
let period = 1;
let selected = ACTIONS[0][0];
let keepers = [];
let events = [];

function save(){
  localStorage.setItem('ts_goleiros_v1', JSON.stringify({team:team.value,opp:opp.value,date:date.value,comp:comp.value,keepers,events,period,selected}));
}
function load(){
  const s = localStorage.getItem('ts_goleiros_v1');
  if(s){try{const d=JSON.parse(s); team.value=d.team||''; opp.value=d.opp||''; date.value=d.date||new Date().toISOString().slice(0,10); comp.value=d.comp||''; keepers=d.keepers||[]; events=d.events||[]; period=d.period||1; selected=d.selected||ACTIONS[0][0];}catch(e){}}
  if(!date.value) date.value = new Date().toISOString().slice(0,10);
  renderAll();
}
function renderAll(){renderActions();renderKeepers();renderLog();renderReport();setPeriod(period,false)}
function renderActions(){
  actions.innerHTML='';
  ACTIONS.forEach(([key,label])=>{
    const b=document.createElement('button'); b.className='action '+(selected===key?'active':''); b.textContent=label; b.onclick=()=>{selected=key; save(); renderActions();}; actions.appendChild(b);
  });
}
function addKeeper(){
  const n=keeperName.value.trim(); if(!n) return;
  if(!keepers.includes(n)) keepers.push(n);
  keeperName.value=''; save(); renderKeepers(); renderReport();
}
function clearKeepers(){ if(confirm('Apagar lista de goleiros?')){keepers=[];events=[];save();renderAll();}}
function loadExample(){ keepers=['Goleiro 1','Goleiro 2','Goleiro 3']; save(); renderAll(); }
function renderKeepers(){
  keepersEl = document.getElementById('keepers'); keepersEl.innerHTML='';
  if(keepers.length===0){keepersEl.innerHTML='<div class="small">Cadastre os goleiros acima.</div>';return;}
  keepers.forEach(name=>{
    const b=document.createElement('button'); b.className='keeper'; b.textContent=name; b.onclick=()=>record(name,b); keepersEl.appendChild(b);
  });
}
function actionLabel(key){return (ACTIONS.find(a=>a[0]===key)||['',key])[1];}
function record(name,btn){
  const ev={id:Date.now()+Math.random(), period, keeper:name, action:selected, label:actionLabel(selected), time:new Date().toLocaleTimeString('pt-BR')};
  events.push(ev); lastAction.textContent=`${ev.label} → ${name} (${period}º tempo)`;
  btn.classList.add('flash'); setTimeout(()=>btn.classList.remove('flash'),250);
  save(); renderLog(); renderReport();
}
function undo(){
  const ev=events.pop(); if(ev){lastAction.textContent=`Desfeito: ${ev.label} → ${ev.keeper}`; save(); renderLog(); renderReport();}
}
function resetStats(){ if(confirm('Zerar todas as estatísticas?')){events=[];save();renderLog();renderReport();lastAction.textContent='Nenhuma';}}
function setPeriod(p,doSave=true){period=p; periodLabel.textContent=p+'º tempo'; document.getElementById('p1').style.outline=p===1?'3px solid #111827':'none'; document.getElementById('p2').style.outline=p===2?'3px solid #111827':'none'; if(doSave) save();}
function renderLog(){
  if(events.length===0){log.innerHTML='Sem registros.';return;}
  log.innerHTML=events.slice(-20).reverse().map(e=>`${e.time} — ${e.period}ºT — <b>${e.keeper}</b>: ${e.label}`).join('<br>');
}
function countsFor(name, p=null){
  const obj={}; ACTIONS.forEach(([k])=>obj[k]=0);
  events.filter(e=>e.keeper===name && (p===null || e.period===p)).forEach(e=>obj[e.action]++);
  return obj;
}
function renderReport(){
  if(keepers.length===0){report.innerHTML='<p class="small">Cadastre os goleiros para gerar relatório.</p>';return;}
  let html='<table><thead><tr><th>Goleiro</th><th>Tempo</th>'+ACTIONS.map(a=>`<th>${a[1]}</th>`).join('')+'<th>Total ações</th></tr></thead><tbody>';
  [1,2,'Total'].forEach(p=>{
    html += `<tr><th colspan="${ACTIONS.length+3}" style="background:#1d4ed8;color:#fff;text-align:left">${p==='Total'?'TOTAL GERAL':p+'º TEMPO'}</th></tr>`;
    keepers.forEach(name=>{
      const c=countsFor(name,p==='Total'?null:p); const total=Object.values(c).reduce((a,b)=>a+b,0);
      html += `<tr><td>${name}</td><td>${p==='Total'?'1º+2º':p+'º'}</td>`+ACTIONS.map(([k])=>`<td>${c[k]||0}</td>`).join('')+`<td><b>${total}</b></td></tr>`;
    });
  });
  html+='</tbody></table>'; report.innerHTML=html;
}
function exportCSV(){
  const header=['Time','Adversário','Data','Competição','Goleiro','Tempo',...ACTIONS.map(a=>a[1]),'Total ações'];
  const rows=[header];
  [1,2,'Total'].forEach(p=> keepers.forEach(name=>{ const c=countsFor(name,p==='Total'?null:p); const total=Object.values(c).reduce((a,b)=>a+b,0); rows.push([team.value,opp.value,date.value,comp.value,name,p==='Total'?'1º+2º':p+'º tempo',...ACTIONS.map(([k])=>c[k]||0),total]); }));
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(';')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='time_scout_goleiros.csv'; a.click(); URL.revokeObjectURL(a.href);
}
['team','opp','date','comp'].forEach(id=>document.getElementById(id).addEventListener('input',save));
load();
</script>
</body>
</html>
